name: zarf_mobile
description: Zarf mobile app
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.5
  dio: ^5.5.0+1
  flutter_secure_storage: ^9.2.2
  http_parser: ^4.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  uuid: ^4.4.2
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0D9488"
  image: "assets/icon/app_icon.png"
  android: true
  ios: false
  android_12:
    color: "#0D9488"
    image: "assets/icon/app_icon.png"
